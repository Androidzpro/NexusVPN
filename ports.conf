# ---------- SERVICIOS BASE ----------
SSH = 22
WEB_PANEL = 8080

# ---------- XRAY / V2RAY ----------
VLESS_TCP = 443
VLESS_GRPC = 8443
VMESS_WS = 80
VMESS_WS_ALT = 8080
VMESS_MKCP = 1194
TROJAN = 2083
SHADOWSOCKS = 8388

# ---------- HYSTERIA2 ----------
HYSTERIA2 = 36712

# ---------- WIREGUARD ----------
WIREGUARD = 51820

# ---------- IKEV2 ----------
IKEV2 = 500
IKEV2_NAT = 4500

# ---------- OPENVPN ----------
OPENVPN_TCP = 1194
OPENVPN_UDP = 1195

# ---------- SLOWDNS ----------
SLOWDNS = 5300

# ---------- BADVPN ----------
BADVPN_PORTS = 7100,7200,7300,7400,7500

# ---------- UDP CUSTOM ----------
UDP_CUSTOM_RANGE = 10000-65000
UDP_CUSTOM_ENABLED = true

